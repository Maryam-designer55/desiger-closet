<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.name }} - The Designer Closet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfbfa; font-family: 'Montserrat', sans-serif; color: #2c2c2c; }
        .brand-header { border-bottom: 1px solid #f1eeea; background-color: #ffffff; padding: 20px 0; }
        .brand-name { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; margin: 0; color: #2c2c2c; text-decoration: none; }
        .detail-img { width: 100%; max-height: 650px; object-fit: cover; background-color: #f5f5f5; }
        .designer-title { font-size: 13px; text-transform: uppercase; letter-spacing: 3px; color: #888; margin-bottom: 10px; }
        .product-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 500; margin-bottom: 15px; }
        .product-price { font-size: 22px; font-weight: 500; color: #b89262; margin-bottom: 25px; }
        .product-desc { font-size: 15px; font-weight: 300; color: #555; line-height: 1.8; margin-bottom: 30px; }
        
        /* Premium Form Controls Styling */
        .form-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #444; margin-bottom: 6px; }
        .form-select, .form-control { border-radius: 0; border: 1px solid #e1deda; padding: 10px 12px; font-size: 13px; transition: 0.3s; background-color: #fff; }
        .form-select:focus, .form-control:focus { border-color: #b89262; box-shadow: none; outline: none; }
        
        .btn-luxury { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; border-radius: 0; padding: 14px; transition: 0.3s; width: 100%; border: none; }
        .btn-add-bag { background-color: #2c2c2c; color: #fff; border: 1px solid #2c2c2c; }
        .btn-add-bag:hover { background-color: #b89262; border-color: #b89262; color: #fff; }
        
        /* Custom Measurement Box Wrapper */
        .custom-measurements-box { background-color: #f7f5f2; border: 1px dashed #d1cbd4; padding: 15px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <header class="brand-header mb-5">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="/" class="brand-name">The Designer Closet</a>
            <a href="/" class="btn btn-outline-dark rounded-0 px-3 btn-sm text-uppercase" style="letter-spacing: 1px; font-size: 11px;">← Back To Shop</a>
        </div>
    </header>

    <div class="container my-5">
        <div class="row g-5 align-items-center">
            <div class="col-md-6">
                {% if product.image %}
                    <img src="{{ product.image.url }}" class="detail-img shadow-sm" alt="{{ product.name }}">
                {% else %}
                    <img src="https://via.placeholder.com/600x800" class="detail-img shadow-sm" alt="Placeholder">
                {% endif %}
            </div>

            <div class="col-md-6">
                <div class="designer-title">{{ product.designer }}</div>
                <h2 class="product-title">{{ product.name }}</h2>
                <div class="product-price">Rs. {{ product.price }}</div>
                <hr class="my-4" style="border-color: #e1deda;">
                <p class="product-desc">{{ product.description }}</p>
                
                <form action="{% url 'add_to_cart' product.id %}" method="POST" class="mt-4">
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Color</label>
                            <select name="color" class="form-select" required>
                                <option value="As Shown">As Shown</option>
                                <option value="Custom Dye">Custom Dye</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Size Option</label>
                            <select name="size" id="sizeSelect" class="form-select" required onchange="toggleCustomFields()">
                                <option value="S">Small (S)</option>
                                <option value="M">Medium (M)</option>
                                <option value="L">Large (L)</option>
                                <option value="Custom">Custom Size</option>
                            </select>
                        </div>
                    </div>

                    <div id="customSizeFields" class="custom-measurements-box">
                        <h6 class="mb-3" style="font-size: 12px; font-weight: 600; text-transform: uppercase; color: #b89262; letter-spacing: 1px;">Provide Custom Measurements (Inches)</h6>
                        <div class="row g-2">
                            <div class="col-4">
                                <label class="form-label" style="font-size: 9px;">Chest</label>
                                <input type="text" name="chest" class="form-control form-control-sm" placeholder="e.g. 19">
                            </div>
                            <div class="col-4">
                                <label class="form-label" style="font-size: 9px;">Waist</label>
                                <input type="text" name="waist" class="form-control form-control-sm" placeholder="e.g. 16">
                            </div>
                            <div class="col-4">
                                <label class="form-label" style="font-size: 9px;">Length</label>
                                <input type="text" name="length" class="form-control form-control-sm" placeholder="e.g. 42">
                            </div>
                        </div>
                        <div class="mt-2">
                            <label class="form-label" style="font-size: 9px;">Special Notes</label>
                            <input type="text" name="special_notes" class="form-control form-control-sm" placeholder="Any special instruction (Sleeve length, etc.)">
                        </div>
                    </div>

                    <div class="row mt-4">
                        <div class="col-lg-8">
                            <button type="submit" class="btn btn-luxury btn-add-bag text-center">
                                Add to Shopping Bag
                            </button>
                        </div>
                    </div>
                </form>
                </div>
        </div>
    </div>

    <script>
        function toggleCustomFields() {
            var sizeSelect = document.getElementById("sizeSelect");
            var customFields = document.getElementById("customSizeFields");
            
            if (sizeSelect.value === "Custom") {
                customFields.style.display = "block";
            } else {
                customFields.style.display = "none";
            }
        }
    </script>

</body>
</html>
