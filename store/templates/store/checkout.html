<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - The Designer Closet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfbfa; font-family: 'Montserrat', sans-serif; color: #2c2c2c; }
        .checkout-header { font-family: 'Playfair Display', serif; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }
        .card-luxury { background: #fff; border: 1px solid #f1eeea; border-radius: 0; box-shadow: 0 4px 20px rgba(0,0,0,0.02); padding: 30px; }
        .form-control { border-radius: 0; border: 1px solid #e1deda; padding: 12px; font-size: 14px; }
        .form-control:focus { border-color: #b89262; box-shadow: none; }
        .btn-order { background-color: #2c2c2c; color: #fff; border-radius: 0; width: 100%; padding: 14px; font-weight: 600; letter-spacing: 2px; font-size: 12px; border: 1px solid #2c2c2c; transition: 0.3s; text-transform: uppercase; }
        .btn-order:hover { background-color: #b89262; border-color: #b89262; color: white; }
    </style>
</head>
<body>
<div class="container my-5">
    <h2 class="text-center checkout-header">Checkout Details</h2>
    
    <div class="row g-5">
        <div class="col-lg-7">
            <div class="card-luxury">
                <h5 class="fw-bold mb-4" style="font-family: 'Playfair Display', serif;">Shipping Information</h5>
                <form method="POST" action="{% url 'checkout' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small text-uppercase fw-semibold text-muted">Full Name</label>
                        <input type="text" name="customer_name" class="form-control" placeholder="e.g. Maryam" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-uppercase fw-semibold text-muted">Phone Number</label>
                        <input type="text" name="phone_number" class="form-control" placeholder="e.g. 03001234567" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small text-uppercase fw-semibold text-muted">Shipping Address</label>
                        <textarea name="shipping_address" class="form-control" rows="4" placeholder="House number, Street, Area name..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-order">Place Order (Cash on Delivery)</button>
                </form>
            </div>
        </div>
        
        <div class="col-lg-5">
            <div class="card-luxury" style="background-color: #fbf8f4;">
                <h5 class="fw-bold mb-4" style="font-family: 'Playfair Display', serif;">Your Order</h5>
                {% for item in cart_items %}
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <h6 class="mb-0 fw-semibold" style="font-size: 14px;">{{ item.product.name }}</h6>
                        <small class="text-muted">Qty: {{ item.quantity }}</small>
                    </div>
                    <span class="small fw-medium">Rs. {{ item.subtotal }}</span>
                </div>
                {% empty %}
                <p class="text-muted small">Aapka cart khali hai.</p>
                {% endfor %}
                <hr>
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <span class="fw-bold text-uppercase small" style="letter-spacing: 1px;">Total Payable:</span>
                    <span class="fw-bold text-success" style="font-size: 20px;">Rs. {{ total_price }}</span>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
