<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.name }} - Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fcfbfa; font-family: 'Playfair Display', Georgia, serif; }
        .product-img { max-height: 600px; object-fit: cover; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .designer-title { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: #888; }
        .product-price { font-size: 24px; color: #b89262; font-weight: bold; margin: 15px 0; }
        .order-card { background: #fff; border: 1px solid #eee; border-radius: 0; padding: 30px; }
        .form-control { border-radius: 0; border: 1px solid #ccc; padding: 12px; }
        .form-control:focus { border-color: #b89262; box-shadow: none; }
        .btn-order { background-color: #2c2c2c; color: #fff; border-radius: 0; padding: 12px; width: 100%; text-uppercase: true; font-weight: bold; }
        .btn-order:hover { background-color: #b89262; color: #fff; }
    </style>
</head>
<body>

    <nav class="navbar navbar-light bg-white border-bottom py-3">
        <div class="container">
            <a class="navbar-brand text-uppercase font-weight-bold" href="/" style="letter-spacing: 2px; font-weight: bold;">← Back to Closet</a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row g-5">
            <div class="col-md-6">
                {% if product.image %}
                    <img src="{{ product.image.url }}" class="product-img" alt="{{ product.name }}">
                {% else %}
                    <img src="https://via.placeholder.com/500x600" class="product-img" alt="No Image">
                {% endif %}
            </div>

            <div class="col-md-6">
                <span class="designer-title">{{ product.designer }}</span>
                <h1 class="my-2" style="font-weight: 500;">{{ product.name }}</h1>
                <div class="product-price">Rs. {{ product.price }}</div>
                
                <p class="text-muted mb-4" style="line-height: 1.7;">{{ product.description }}</p>
                <hr class="my-4">

                <div class="order-card">
                    <h4 class="mb-4 text-uppercase" style="letter-spacing: 1px; font-size: 18px;">Place Your Order (Cash on Delivery)</h4>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label text-muted small">Your Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Phone Number</label>
                            <input type="text" name="phone" class="form-control" placeholder="e.g. 03001234567" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small">Shipping Address</label>
                            <textarea name="address" class="form-control" rows="3" placeholder="Complete home address with city" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-order text-uppercase">Confirm Order</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
