<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Designer Closet{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfbfa; font-family: 'Montserrat', sans-serif; color: #2c2c2c; }
        .navbar-brand { font-family: 'Playfair Display', serif; letter-spacing: 2px; font-weight: 600; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">
        <div class="container">
            <a class="navbar-brand text-uppercase" href="/">The Designer Closet</a>
            <div class="ms-auto">
                <a href="/cart/" class="btn btn-outline-dark rounded-0 position-relative">
                    Bag
                </a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center py-4 bg-white border-top mt-5">
        <p class="text-muted small mb-0">&copy; 2026 The Designer Closet. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
